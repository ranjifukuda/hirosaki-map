<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2026 Hirosaki Sakura Festival Map</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RVE9ZMG3RG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RVE9ZMG3RG');
  </script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; background-color: #f8ecec; }
    #map { width: 100%; height: 100%; z-index: 1; } 
    
    #lang-selector {
      position: absolute; top: 10px; left: 10px; z-index: 1000;
      background: rgba(255, 255, 255, 0.95); padding: 5px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; gap: 4px;
    }
    .lang-btn { cursor: pointer; padding: 6px 10px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 13px; font-weight: bold; color: #555; background: #fff; transition: 0.2s; }
    .lang-btn.active { background: #ff4ea3; color: white; border-color: #ff4ea3; }

    #filter-container {
      position: absolute; top: 55px; right: 10px; z-index: 1000;
      background: rgba(255, 255, 255, 0.95); padding: 10px 15px; border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); min-width: 120px;
    }
    .filter-title { 
      font-weight:bold; font-size:14px; color: #333; margin:0;
      cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .filter-title::after { content: '▼'; font-size: 10px; transition: transform 0.3s ease; margin-left: 20px; color: #ff4ea3; }
    .filter-title.open { border-bottom:2px solid #ff4ea3; padding-bottom:6px; margin-bottom:8px; }
    .filter-title.open::after { transform: rotate(180deg); }
    #filter-list { display: none; max-height: calc(100vh - 160px); overflow-y: auto; }
    #filter-list.open { display: block; }
    .filter-item { margin-bottom: 6px; font-size: 12px; display: flex; align-items: center; color: #444;}
    .filter-item input { margin-right: 6px; width: 14px; height: 14px; cursor: pointer; }

    #locate-btn {
      position: absolute; bottom: 20px; right: 10px; z-index: 1000;
      background: white; border: 2px solid rgba(0,0,0,0.1); border-radius: 8px;
      width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); color: #333;
    }
    .user-location-icon {
      background-color: #007bff; border: 3px solid white; border-radius: 50%;
      box-shadow: 0 0 5px rgba(0,0,0,0.5); width: 16px !important; height: 16px !important; margin-left: -8px !important; margin-top: -8px !important;
    }

    .custom-emoji-icon {
      font-size: 18px; text-align: center; line-height: 28px; background: white; border-radius: 50%; border: 2px solid #ff4ea3; box-shadow: 0 2px 5px rgba(0,0,0,0.3); width: 28px !important; height: 28px !important;
    }
    .leaflet-popup-content-wrapper { border-radius: 8px; padding: 1px; }
    .leaflet-popup-content { margin: 10px 14px; line-height: 1.4; }
    .popup-title { font-size: 15px; font-weight: bold; color: #ff4ea3; margin-bottom: 4px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    .popup-name { font-size: 13px; font-weight: bold; margin-bottom: 2px; color: #333; }
    .popup-sub { font-size: 11px; color: #777; }
  </style>
</head>
<body>

<div id="lang-selector">
  <div class="lang-btn" onclick="changeLang('ja')" id="btn-ja">JP</div>
  <div class="lang-btn" onclick="changeLang('en')" id="btn-en">EN</div>
  <div class="lang-btn" onclick="changeLang('zh')" id="btn-zh">ZH</div>
</div>

<div id="filter-container">
  <div id="filter-title" class="filter-title">表示切替</div>
  <div id="filter-list"></div>
</div>

<div id="locate-btn" title="現在地を表示">🧭</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
  const rawCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRtnM7Yi8eYM5dziTLTZesCllpqOpqkWs2ZOUkUf93HpoMnSV0IkK81eEUKcVTs2mKSbhR8OyanoVZ8/pub?gid=0&single=true&output=csv';
  const cacheBuster = Math.floor(new Date().getTime() / 300000); 
  const csvUrl = rawCsvUrl + '&cb=' + cacheBuster;

  const browserLang = (navigator.language || navigator.userLanguage).toLowerCase();
  let currentLang = 'ja'; 
  if (browserLang.startsWith('en')) currentLang = 'en';
  else if (browserLang.match(/zh-tw|zh-hk|zh-mo|zh-hant/)) currentLang = 'zh';
  else if (browserLang.startsWith('zh')) currentLang = 'zh';

  const uiTexts = {
    ja: { filterTitle: "表示切替", unknown: "詳細不明" },
    en: { filterTitle: "Filter", unknown: "Unknown" },
    zh: { filterTitle: "顯示切換", unknown: "詳情未明" }
  };

  let allData = [];
  let activeFilters = new Set(); 

  const categories = {
    "飲食・屋台めし": { emoji: "🍱", en: "Food Stalls", zh: "飲食・屋台美食", keywords: /焼きそば|焼そば|肉|ステーキ|カレー|たこ焼き|イカ|いか|ほたて|海鮮|串焼き|おにぎり|バーガー|フランク|ドッグ|ポテト|じゃが|チーズ|パン|豚饅|笹かまぼこ|お好み焼き|大阪焼|yakisoba|meat|curry|takoyaki|squid|scallop|burger|bread|okonomiyaki|食堂|とらや|ありがとう|三浦|三忠|よこやま|ラーメン|そば|うどん|麺|フードフェスタ|restaurant|ramen|noodle/ },
    "スイーツ・喫茶": { emoji: "🍰", en: "Sweets & Cafe", zh: "甜點・喫茶", keywords: /りんご|アップル|いちご|バナナ|みかん|栗|チョコ|だんご|団子|もち|餅|アイス|氷|飴|キャンディー|クレープ|カステラ|ドーナツ|チュロス|ケーキ|パイ|パフェ|お菓子|菓子|candy|sweets|apple|strawberry|banana|ice|dango/ },
    "物販・おみやげ": { emoji: "🛍️", en: "Souvenirs & Goods", zh: "伴手禮", keywords: /土産|物産|工芸|染|石|漆|焼|陶|シャツ|物産館|ギャラリー|souvenir|museum|gallery/ },
    "エンタメ": { emoji: "🎯", en: "Entertainment", zh: "娛樂", keywords: /射的|ゲーム|くじ|ルーレット|ストライク|ボール|金魚|おめん|おもちゃ|迷路|おばけ|マジック|target|game|goldfish|toy|ghost/ },
    "トイレ": { emoji: "🚻", en: "Restroom", zh: "洗手間", keywords: /トイレ|toilet|restroom/ },
    "授乳室": { emoji: "🍼", en: "Nursing Room", zh: "哺乳室", keywords: /授乳|nursing/ },
    "喫煙所": { emoji: "🚬", en: "Smoking Area", zh: "吸菸區", keywords: /喫煙|smoking/ },
    "ごみ捨て場": { emoji: "🗑️", en: "Trash", zh: "垃圾處", keywords: /ごみ|ゴミ|trash|dump/ },
    "AED": { emoji: "💓", en: "AED", zh: "AED", keywords: /aed/i },
    "祭り関連施設": { emoji: "ℹ️", en: "Facilities", zh: "祭典設施", keywords: /案内|本部|救護|情報|警察|自転車|駐輪|城|櫓|門|車いす|info|police|bicycle|wheelchair/ }
  };

  const map = L.map('map', { zoomControl: false }).setView([40.6083, 140.4641], 16);
  L.control.zoom({ position: 'bottomleft' }).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  const markerCluster = L.markerClusterGroup({ maxClusterRadius: 40, disableClusteringAtZoom: 18 });
  map.addLayer(markerCluster);

  L.DomEvent.disableClickPropagation(document.getElementById('filter-container'));
  L.DomEvent.disableScrollPropagation(document.getElementById('filter-container'));
  L.DomEvent.disableClickPropagation(document.getElementById('lang-selector'));

  map.on('click dragstart', function() {
    const title = document.getElementById('filter-title');
    const list = document.getElementById('filter-list');
    if (title.classList.contains('open')) {
      title.classList.remove('open');
      list.classList.remove('open');
    }
  });

  let userMarker = null;
  let userCircle = null;
  map.on('locationfound', function(e) {
    const radius = e.accuracy / 2;
    if (!userMarker) {
      userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'user-location-icon', html: '' }) }).addTo(map);
      userCircle = L.circle(e.latlng, radius, { color: '#007bff', fillColor: '#007bff', fillOpacity: 0.1, weight: 1 }).addTo(map);
    } else {
      userMarker.setLatLng(e.latlng);
      userCircle.setLatLng(e.latlng);
      userCircle.setRadius(radius);
    }
  });
  
  document.getElementById('locate-btn').addEventListener('click', function() {
    map.locate({ setView: true, maxZoom: 17, enableHighAccuracy: true });
    
    // 📊 GA4: 現在地ボタンの利用を計測
    gtag('event', 'use_geolocation', { 'ui_language': currentLang });
  });

  function getColVal(row, keywords) {
    for (let key of Object.keys(row)) {
      let k = key.toLowerCase().trim();
      for (let kw of keywords) {
        if (k.includes(kw)) return String(row[key]).trim();
      }
    }
    return "";
  }

  function getSpecificEmoji(text) {
    text = text.toLowerCase();
    const overrides = [
      { key: "aed", emoji: "💓" }, { key: "車いす", emoji: "♿" }, { key: "カランカランアイス", emoji: "🍨" },
      { key: "ギャラリーイシオカ", emoji: "🛍️" }, { key: "お菓子のヒロヤ", emoji: "🍰" }, { key: "ありがとう食堂", emoji: "🍜" },
      { key: "とらや", emoji: "🍜" }, { key: "海鮮串焼き", emoji: "🍖" }, { key: "ワイン", emoji: "🍷" },
      { key: "みそこんにゃく", emoji: "🍢" }, { key: "かくみ", emoji: "🍗" }, { key: "噂の豚饅", emoji: "🥟" },
      { key: "焼ポン", emoji: "🍿" }, { key: "チーズスティック", emoji: "🥨" }, { key: "ほたて串焼き", emoji: "🍖" },
      { key: "バナナチョコ", emoji: "🍌" }, { key: "花見だんご", emoji: "🍡" }, { key: "おでん・やきとり・やきそば", emoji: "🍢" },
      { key: "おでんラーメンやきそば", emoji: "🍢" }, { key: "蟹味噌", emoji: "🦀" }, { key: "笹かまぼこ", emoji: "🍖" },
      { key: "お好み焼", emoji: "🍳" }, { key: "弘前物産館", emoji: "🛍️" }, { key: "ジャンボおでん", emoji: "🍢" },
      { key: "いちご飴", emoji: "🍭" }, { key: "みたらし団子", emoji: "🍡" }, { key: "焼きだんご", emoji: "🍡" },
      { key: "甘栗", emoji: "🌰" }, { key: "大判焼", emoji: "🍘" }, { key: "natural candy", emoji: "🥤" },
      { key: "川村商店", emoji: "🍗" }, { key: "カレップルパン", emoji: "🍞" }, { key: "ブリトードック", emoji: "🌯" },
      { key: "カットりんご", emoji: "🍎" }, { key: "嶽きみ天ぷら", emoji: "🍤" }, { key: "もつ煮込み", emoji: "🍲" },
      { key: "さつまスティック", emoji: "🍟" }, { key: "亀屋のたこやき", emoji: "🐙" }, { key: "たこやき", emoji: "🐙" },
      { key: "クラフトビール", emoji: "🍺" }, { key: "10円パン", emoji: "🍞" }, { key: "トロピカルジュース", emoji: "🍹" },
      { key: "味噌カレー", emoji: "🍜" }, { key: "いがめんち", emoji: "🧆" }, { key: "青森地酒", emoji: "🍶" },
      { key: "チーズドッグ", emoji: "🌭" }, { key: "もちもちポテト", emoji: "🍟" }, { key: "シロコロホルモン", emoji: "🥩" },
      { key: "いか焼", emoji: "🦑" }, { key: "から揚げ", emoji: "🍗" }, { key: "トルネードポテト", emoji: "🍟" },
      { key: "梅ケ枝", emoji: "🍜" }, { key: "輪なげ", emoji: "⭕" }, { key: "おばけ屋敷", emoji: "👻" },
      { key: "マジックハウス", emoji: "🎪" }, { key: "ジャンボ迷路", emoji: "🎪" }, { key: "おでん", emoji: "🍢" },
      { key: "珈琲", emoji: "☕" }, { key: "コーヒー", emoji: "☕" }, { key: "うるし工房", emoji: "🛍️" },
      { key: "観光舟", emoji: "⛵" }, { key: "ファンシー", emoji: "🎯" }, { key: "名物肉巻", emoji: "🍖" },
      { key: "おかげ", emoji: "🍧" }, { key: "ピタパンサンド", emoji: "🥪" }, { key: "牛ステーキ", emoji: "🍖" },
      { key: "駐輪場", emoji: "🚲" }, { key: "自転車", emoji: "🚲" }, { key: "フードフェスタ", emoji: "🍱" }, { key: "ちくわ天", emoji: "🍤" }
    ];
    for (let ov of overrides) {
      if (text.includes(ov.key.toLowerCase())) return ov.emoji;
    }
    for (let [name, cat] of Object.entries(categories)) {
      if (cat.keywords.test(text)) return cat.emoji;
    }
    return "🎪"; 
  }

  function detectCategory(text, definedCat) {
    if (definedCat && categories[definedCat]) return definedCat;
    const catOverrides = [
      { key: "津軽漆", cat: "物販・おみやげ" }, { key: "中濠観光", cat: "エンタメ" }, { key: "ファンシー", cat: "エンタメ" },
      { key: "抹茶接待", cat: "スイーツ・喫茶" }, { key: "匠館", cat: "スイーツ・喫茶" }, { key: "弘前市立観光館", cat: "物販・おみやげ" },
      { key: "成田専蔵", cat: "スイーツ・喫茶" }, { key: "演芸場", cat: "エンタメ" }, { key: "おかげ茶や", cat: "スイーツ・喫茶" },
      { key: "トロピカルジュース", cat: "スイーツ・喫茶" }, { key: "カフェデリーナ", cat: "スイーツ・喫茶" }, { key: "梅ケ枝", cat: "飲食・屋台めし" },
      { key: "わくわくランド", cat: "エンタメ" }, { key: "バルーンハウス", cat: "エンタメ" }, { key: "大髙商店", cat: "飲食・屋台めし" },
      { key: "中村商店", cat: "飲食・屋台めし" }, { key: "広島のお好み焼", cat: "飲食・屋台めし" }, { key: "赤石商店", cat: "飲食・屋台めし" },
      { key: "阿保商店", cat: "スイーツ・喫茶" }, { key: "丹藤商店", cat: "飲食・屋台めし" }, { key: "安田商店", cat: "スイーツ・喫茶" },
      { key: "aed", cat: "AED" }
    ];
    for (let ov of catOverrides) {
      if (text.includes(ov.key.toLowerCase())) return ov.cat;
    }
    for (let [name, cat] of Object.entries(categories)) {
      if (cat.keywords.test(text)) return name;
    }
    return "飲食・屋台めし"; 
  }

  function updateMarkers() {
    markerCluster.clearLayers();

    allData.forEach(row => {
      let labelStr = getColVal(row, ["表示用ラベル", "ラベル"]);
      let nameStr = getColVal(row, ["正式名称", "名称"]);
      let enStr = getColVal(row, ["english", "en"]);
      let zhStr = getColVal(row, ["繁体", "zh"]);
      let catCol = getColVal(row, ["カテゴリー", "カテゴリ"]);
      let latStr = getColVal(row, ["緯度", "lat", "latitude"]);
      let lonStr = getColVal(row, ["経度", "lon", "long", "longitude"]);

      const text = (labelStr + " " + nameStr).toLowerCase();
      const cat = detectCategory(text, catCol);

      if (activeFilters.size === 0 || activeFilters.has(cat)) {
        const lat = parseFloat(latStr);
        const lon = parseFloat(lonStr);
        
        if (!isNaN(lat) && !isNaN(lon)) {
          const icon = L.divIcon({ className: 'custom-emoji-icon', html: getSpecificEmoji(text) });
          
          let mainTitle = labelStr || uiTexts[currentLang].unknown;
          let subTitle1 = nameStr;
          
          if (currentLang === 'en' && enStr) {
            mainTitle = enStr; subTitle1 = "JP: " + nameStr; 
          } else if (currentLang === 'zh' && zhStr) {
            mainTitle = zhStr; subTitle1 = "JP: " + nameStr; 
          }

          let html = `<div class="popup-title">${mainTitle}</div>`;
          if (subTitle1) html += `<div class="popup-name">${subTitle1}</div>`;
          if (currentLang !== 'en' && enStr) html += `<div class="popup-sub">EN: ${enStr}</div>`;
          if (currentLang !== 'zh' && zhStr) html += `<div class="popup-sub">ZH: ${zhStr}</div>`;

          const marker = L.marker([lat, lon], { icon: icon }).bindPopup(html).addTo(markerCluster);

          // 📊 GA4: ピンがタップされた時の計測（人気店舗や人気エリアの分析用）
          marker.on('click', function() {
             gtag('event', 'select_location', {
                'location_name': nameStr || labelStr,
                'location_category': cat,
                'ui_language': currentLang
             });
          });
        }
      }
    });
  }

  function initFilterUI() {
    const titleEl = document.getElementById('filter-title');
    const listEl = document.getElementById('filter-list');
    
    titleEl.innerText = uiTexts[currentLang].filterTitle;
    listEl.innerHTML = ""; 
    
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('btn-' + currentLang).classList.add('active');

    titleEl.onclick = function(e) {
      this.classList.toggle('open');
      listEl.classList.toggle('open');
    };

    Object.keys(categories).forEach(cat => {
      const div = document.createElement('div');
      div.className = 'filter-item';
      let label = currentLang === 'en' ? categories[cat].en : (currentLang === 'zh' ? categories[cat].zh : cat);
      
      const isChecked = activeFilters.has(cat);
      div.innerHTML = `<label><input type="checkbox" value="${cat}" ${isChecked ? 'checked' : ''}> <span style="margin-right:4px;">${categories[cat].emoji}</span> ${label}</label>`;
      
      div.querySelector('input').addEventListener('change', (e) => {
        const isNowChecked = e.target.checked;
        if (isNowChecked) {
            activeFilters.add(cat);
        } else {
            activeFilters.delete(cat);
        }
        updateMarkers();

        // 📊 GA4: カテゴリーの絞り込みを計測
        gtag('event', 'filter_category', {
            'category_name': cat,
            'filter_action': isNowChecked ? 'check' : 'uncheck',
            'ui_language': currentLang
        });
      });
      listEl.appendChild(div);
    });
  }

  window.changeLang = function(lang) { 
      currentLang = lang; 
      initFilterUI(); 
      updateMarkers(); 
      
      // 📊 GA4: 言語の切り替えを計測
      gtag('event', 'change_language', {
         'selected_language': lang
      });
  };

  function fetchAndRenderData() {
    Papa.parse(csvUrl, {
      download: true, header: true, skipEmptyLines: true,
      complete: (res) => { 
        if (res.data && res.data.length > 0) {
          allData = res.data; 
          try { localStorage.setItem('sakuraMapData2026', JSON.stringify(allData)); } catch(e) {}
          initFilterUI(); 
          updateMarkers(); 
        }
      },
      error: (err) => {
        try {
          const cachedData = localStorage.getItem('sakuraMapData2026');
          if (cachedData) {
            allData = JSON.parse(cachedData);
            initFilterUI(); 
            updateMarkers();
            return;
          }
        } catch(e) {}
      }
    });
  }

  fetchAndRenderData();

</script>
</body>
</html>
